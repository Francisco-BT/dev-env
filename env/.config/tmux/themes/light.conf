# Light status bar — Dracula Alucard fg on cream (#ECE9DF)
set -g status-style 'bg=#ECE9DF fg=#1F1F1F'
set -g window-status-style 'bg=#ECE9DF fg=#6C664B'
set -g window-status-current-style 'bg=#ECE9DF fg=#036A96 bold'
set -g pane-border-style 'fg=#CFCFDE'
set -g pane-active-border-style 'fg=#036A96'
set -g status-left-length 48
set -g status-left "#{?#{m:x-*,#{session_name}},#[fg=colour4]#[bold][X·#{s/^mine-//:#{s/^work-//:#{s/^x-//:#{session_name}}}}],#{?#{||:#{m:*work*,#{pane_current_path}},#{m:*work*,#{session_name}}},#[fg=colour6]#[bold][W·#{s/^mine-//:#{s/^work-//:#{s/^x-//:#{session_name}}}}],#{?#{||:#{m:*mine*,#{pane_current_path}},#{m:*mine*,#{session_name}}},#[fg=colour2]#[bold][M·#{s/^mine-//:#{s/^work-//:#{s/^x-//:#{session_name}}}}],#[fg=colour3]#[bold][#{s/^mine-//:#{s/^work-//:#{s/^x-//:#{session_name}}}}]}}} #[fg=#6C664B]"
